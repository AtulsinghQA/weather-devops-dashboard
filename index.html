<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Health | Weather Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.7);
            --border: #30363d;
            --accent: #238636;
            --text: #c9d1d9;
            --error: #da3633;
            --warning: #d29922;
            --info: #58a6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #161b22 1px, transparent 0);
            background-size: 40px 40px;
            color: var(--text);
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard {
            width: 100%;
            max-width: 900px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .status-pill {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(35, 134, 54, 0.1);
            color: var(--accent);
            border: 1px solid var(--accent);
            text-transform: uppercase;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 25px;
            display: flex;
            gap: 10px;
        }

        input {
            background: #0d1117;
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-family: inherit;
            flex-grow: 1;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 8px;
        }

        .card h3 {
            font-size: 0.75rem;
            color: #8b949e;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #fff;
        }

        .unit { font-size: 1rem; color: #8b949e; }

        .progress-container {
            height: 4px;
            background: #21262d;
            margin-top: 15px;
            border-radius: 2px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.5s ease;
        }

        .console {
            margin-top: 30px;
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            font-size: 0.8rem;
            height: 140px;
            overflow-y: auto;
            color: #7d8590;
        }

        .log-entry { margin-bottom: 5px; }
        .log-time { color: var(--accent); margin-right: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <header>
        <div>
            <h1 id="city-display">System Environment</h1>
            <p style="font-size: 0.8rem; color: #8b949e;">Node: MacBook-M1-Controller</p>
        </div>
        <div id="status-indicator" class="status-pill">Awaiting Signal</div>
    </header>

    <div class="input-group">
        <input type="text" id="city-input" placeholder="Enter City Manually..." onkeypress="if(event.key === 'Enter') updateDashboard()">
        <button onclick="updateDashboard()">Sync Data</button>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Thermal Load (Temp)</h3>
            <div class="value" id="temp-val">--<span class="unit">°C</span></div>
            <div id="weather-desc" style="font-size: 0.8rem; margin-top: 5px; color: #8b949e;">Awaiting signal...</div>
        </div>

        <div class="card">
            <h3>Network Latency</h3>
            <div class="value" id="latency-val">--<span class="unit">ms</span></div>
            <div class="progress-container">
                <div id="latency-bar" class="progress-fill"></div>
            </div>
        </div>

        <div class="card">
            <h3>Atmospheric Density</h3>
            <div class="value" id="hum-val">--<span class="unit">%</span></div>
            <div style="font-size: 0.8rem; margin-top: 5px; color: #8b949e;">Humidity Levels</div>
        </div>
    </div>

    <div class="console" id="console"></div>
</div>

<script>
    const API_KEY = 'b3a4201d0c7d7dbeb94180878986af8a';

    // TRIGGER ON LOAD: Automatically ask for location
    window.onload = () => {
        addLog("System boot complete. Initializing Geolocation...", "SYSTEM");
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    addLog("GPS Lock Acquired.", "SUCCESS");
                    updateDashboard(`lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                },
                () => {
                    addLog("Location access denied. Please enter city manually.", "WARNING");
                    updateDashboard(); // Fallback to default
                }
            );
        }
    };

    function addLog(message, type = 'INFO') {
        const consoleEl = document.getElementById('console');
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        
        let color = '#7d8590';
        if(type === 'SUCCESS') color = 'var(--accent)';
        if(type === 'CRITICAL') color = 'var(--error)';
        if(type === 'SYSTEM') color = 'var(--info)';
        
        entry.innerHTML = `<span class="log-time">[${time}]</span> <span style="color: ${color}">[${type}]</span> ${message}`;
        consoleEl.prepend(entry);
    }

    async function updateDashboard(query = null) {
        const input = document.getElementById('city-input');
        const statusInd = document.getElementById('status-indicator');
        
        let queryString = query || `q=${input.value.trim() || 'London'}`;
        addLog(`Fetching data packets for: ${queryString}...`);

        statusInd.innerText = "Synchronizing...";
        const startTime = performance.now();

        try {
            const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?${queryString}&appid=${API_KEY}&units=metric`);
            if (!response.ok) throw new Error(`HTTP Error ${response.status}`);

            const data = await response.json();
            const latency = Math.round(performance.now() - startTime);

            // Update UI
            document.getElementById('city-display').innerText = `${data.name} Environment`;
            document.getElementById('temp-val').innerHTML = `${Math.round(data.main.temp)}<span class="unit">°C</span>`;
            document.getElementById('hum-val').innerHTML = `${data.main.humidity}<span class="unit">%</span>`;
            document.getElementById('weather-desc').innerText = `Conditions: ${data.weather[0].description}`;
            document.getElementById('latency-val').innerHTML = `${latency}<span class="unit">ms</span>`;
            
            const bar = document.getElementById('latency-bar');
            bar.style.width = `${Math.min(latency / 5, 100)}%`;
            bar.style.backgroundColor = latency > 400 ? 'var(--error)' : 'var(--accent)';

            statusInd.innerText = "Operational";
            statusInd.style.color = "var(--accent)";
            statusInd.style.borderColor = "var(--accent)";
            
            addLog(`Node synchronized. Latency: ${latency}ms`, 'SUCCESS');
            input.value = ""; 

        } catch (err) {
            addLog(`Critical Failure: ${err.message}`, 'CRITICAL');
            statusInd.innerText = "System Failure";
            statusInd.style.color = "var(--error)";
            statusInd.style.borderColor = "var(--error)";
        }
    }
</script>
</body>
</html>
